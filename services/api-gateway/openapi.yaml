          example: fantasy
        characters:
          type: array
          items:
            type: string
            enum: [narrator, hero, villain, sidekick, wise_old_man, mystical_creature]
          description: Character list
          example: [hero, wise_old_man, villain]
          default: [hero]
        duration:
          type: string
          enum: [short, long]
          description: Story duration (short: 500 words, long: 1500 words)
          example: long
          default: short

    GenerateStoryResponse:
      type: object
      required:
        - success
        - story
