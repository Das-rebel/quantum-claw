              type: number
            p99Latency:
              type: number
            endpoints:
              type: object
              additionalProperties:
                type: integer
            timeSeries:
              type: array
              items:
                type: object
                properties:
                  timestamp:
                    type: string
                    requests:
                      type: integer

    QuotaUsageResponse:
      type: object
