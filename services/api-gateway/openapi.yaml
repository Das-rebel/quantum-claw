          type: string
          description: Full API key (show only once)
          example: sk_live_abc123def456...
        keyId:
          type: string
          description: Key identifier for management
          example: sk_...abc123
        createdAt:
          type: string
          format: date-time

    ApiKeyDetails:
      type: object
      required:
        - success
        - key
      properties:
        success:
          type: boolean
          example: true
        key:
          type: object
          properties:
            keyId:
              type: string
            name:
              type: string
            tier:
              type: string
            scopes:
              type: array
              items:
                type: string
            createdAt:
              type: string
              format: date-time
            lastUsed:
              type: string
              format: date-time
            expiresAt:
              type: string
              format: date-time
            isActive:
              type: boolean

    RateLimitStatus:
      type: object
      required:
        - success
        - rateLimit
      properties:
        success:
          type: boolean
          example: true
        rateLimit:
          type: object
          properties:
            tier:
              type: string
            hourlyLimit:
              type: integer
            hourlyUsed:
              type: integer
            hourlyRemaining:
              type: integer
            minuteLimit:
              type: integer
            minuteUsed:
              type: integer
            minuteRemaining:
              type: integer
            resetTime:
              type: string
              format: date-time
            retryAfter:
              type: integer
              description: Seconds until rate limit resets

    Error:
      type: object
      required:
        - success
        - error
        - timestamp
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          description: Error message
          example: Invalid request format
        timestamp:
          type: string
          format: date-time
          example: '2026-03-27T10:30:00.000Z'
        requestId:
          type: string
          description: Request identifier for debugging
          example: req_abc123def456

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: Invalid request format
            timestamp: '2026-03-27T10:30:00.000Z'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: Invalid or missing API key
            timestamp: '2026-03-27T10:30:00.000Z'

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: Insufficient permissions for this operation
            timestamp: '2026-03-27T10:30:00.000Z'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: Resource not found
            timestamp: '2026-03-27T10:30:00.000Z'

    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string
                example: Rate limit exceeded
              timestamp:
                type: string
                format: date-time
              retryAfter:
                type: integer
                description: Seconds until retry
                example: 60

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: Internal server error
            timestamp: '2026-03-27T10:30:00.000Z'

    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
