openapi: 3.0.3
info:
  title: OmniClaw Enhanced API
  description: |
    Production API Gateway for OmniClaw Enhanced serverless voice control system.

    ## Features
    - **Authentication**: API key-based authentication with scoped permissions
    - **Rate Limiting**: Multiple tier-based rate limiting strategies
    - **Quota Management**: Per-user and per-key quota tracking
    - **Monitoring**: Comprehensive analytics and metrics
    - **Security**: Request validation, CORS, DDoS protection

    ## Rate Limiting Tiers
    - **Free**: 100 requests/hour, 10 requests/minute
    - **Basic**: 1,000 requests/hour, 100 requests/minute
    - **Pro**: 10,000 requests/hour, 1,000 requests/minute
    - **Enterprise**: Unlimited, custom limits

    ## Authentication
    All requests require an API key via the `Authorization` header:
    ```
    Authorization: Bearer YOUR_API_KEY
    ```

  version: 1.0.0
  contact:
    name: OmniClaw Enhanced Support
    email: support@omniclaw-enhanced.com
    url: https://omniclaw-enhanced.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://us-central1-omniclaw-enhanced.cloudfunctions.net
    description: Production server (us-central1)
  - url: https://gateway.omniclaw-enhanced.com
    description: API Gateway (production)
  - url: https://staging-gateway.omniclaw-enhanced.com
    description: API Gateway (staging)

tags:
  - name: Health
    description: Health check and status endpoints
  - name: Price
    description: Product price tracking endpoints
  - name: Story
    description: AI story generation and TTS endpoints
  - name: Media
    description: Unified media control endpoints
  - name: Analytics
    description: Analytics and reporting endpoints
  - name: Email
    description: Email notification endpoints
  - name: API Keys
    description: API key management endpoints
  - name: Rate Limiting
    description: Rate limiting and quota endpoints

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check API Gateway health status
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                version: 1.0.0
                timestamp: '2026-03-27T10:30:00.000Z'
                uptime: 86400
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Check if all backend services are ready
      operationId: readinessCheck
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /price/products:
    post:
      tags:
        - Price
      summary: Add product to tracking
      description: Add a product URL for price monitoring with automatic Cloud Tasks enqueueing
      operationId: addProduct
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProductRequest'
            examples:
              amazon:
                summary: Amazon product
                value:
                  userId: user_123
                  url: 'https://amazon.com/dp/B08N5WRWNW'
                  threshold: 299.99
                  platform: amazon
                  priority: high
              generic:
                summary: Generic product
                value:
                  userId: user_456
                  url: 'https://example.com/product/123'
                  threshold: 99.99
                  platform: auto
                  priority: normal
      responses:
        '201':
          description: Product added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddProductResponse'
              example:
                success: true
                message: Product added to tracking
                productId: abc123def456
                priority: high
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /price/products:
    get:
      tags:
        - Price
      summary: Get tracked products
      description: Retrieve all active tracked products for a user
      operationId: getTrackedProducts
      security:
        - APIKeyAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
          description: User identifier
          example: user_123
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Maximum number of products to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of products to skip
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /price/products/{productId}:
    get:
      tags:
        - Price
      summary: Get product details
      description: Retrieve detailed information about a tracked product
      operationId: getProduct
      security:
        - APIKeyAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
          description: Product ID
          example: abc123def456
      responses:
        '200':
          description: Product details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /price/products/{productId}/history:
    get:
      tags:
        - Price
      summary: Get price history
      description: Retrieve historical price data for a tracked product (last 100 entries)
      operationId: getPriceHistory
      security:
        - APIKeyAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
          description: Product ID
          example: abc123def456
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
          description: Maximum number of history entries
      responses:
        '200':
          description: Price history retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceHistoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /price/products/{productId}:
    delete:
      tags:
        - Price
      summary: Delete product
      description: Soft-delete a product from tracking (sets active: false)
      operationId: deleteProduct
      security:
        - APIKeyAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
          description: Product ID to deactivate
          example: abc123def456
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Product removed from tracking
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /price/check:
    post:
      tags:
        - Price
      summary: Check prices immediately
      description: Trigger immediate price check for up to 10 active products (enqueues high-priority Cloud Tasks)
      operationId: checkPrices
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  description: User identifier
                  example: user_123
      responses:
        '200':
          description: Prices check initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Enqueued 5 products for price check
                  count:
                    type: integer
                    example: 5
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /story/tts:
    post:
      tags:
        - Story
      summary: Text-to-speech conversion
      description: Convert text to speech with character voice and emotion
      operationId: textToSpeech
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextToSpeechRequest'
            examples:
              narrator:
                summary: Narrator voice
                value:
                  text: 'Once upon a time, in a land far away...'
                  character: narrator
                  emotion: mysterious
              hero:
                summary: Hero character
                value:
                  text: I must find the ancient artifact!
                  character: hero
                  emotion: determined
      responses:
        '200':
          description: Audio generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextToSpeechResponse'
              example:
                success: true
                audio: base64_encoded_audio_data_here...
                cached: false
                character: narrator
                emotion: mysterious
                duration: 5.2
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /story/generate:
    post:
      tags:
        - Story
      summary: Generate AI story
      description: Generate an AI story using Claude with specified genre and characters
      operationId: generateStory
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateStoryRequest'
            examples:
              fantasy:
                summary: Fantasy story
                value:
                  genre: fantasy
                  characters:
                    - hero
                    - wise_old_man
                    - villain
                  duration: long
              sciFi:
                summary: Sci-fi story
                value:
                  genre: sci-fi
                  characters:
                    - hero
                    - sidekick
                  duration: short
      responses:
        '200':
          description: Story generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateStoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /story/voices:
    get:
      tags:
        - Story
      summary: Get voice profiles
      description: Retrieve all available character voice profiles and their settings
      operationId: getVoiceProfiles
      security:
        - APIKeyAuth: []
      responses:
        '200':
          description: Voice profiles retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceProfilesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /media/play:
    post:
      tags:
        - Media
      summary: Play media
      description: Play media on specified platform
      operationId: playMedia
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayMediaRequest'
            examples:
              spotify:
                summary: Play Spotify track
                value:
                  platform: spotify
                  action: track
                  params:
                    uri: 'spotify:track:4iV5W9uYEdYUVa79Axb7Rh'
              youtube:
                summary: Play YouTube video
                value:
                  platform: youtube
                  action: video
                  params:
                    videoId: dQw4w9WgXcQ
      responses:
        '200':
          description: Playback initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /media/pause:
    post:
      tags:
        - Media
      summary: Pause playback
      description: Pause playback on specified platform
      operationId: pauseMedia
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - platform
              properties:
                platform:
                  type: string
                  enum: [spotify, youtube, fen, kodi]
                  description: Media platform
      responses:
        '200':
          description: Playback paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /media/search:
    post:
      tags:
        - Media
      summary: Search media
      description: Search for media on specified platform
      operationId: searchMedia
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - platform
                - params
              properties:
                platform:
                  type: string
                  enum: [spotify, youtube, fen, kodi]
                  description: Media platform
                params:
                  type: object
                  required:
                    - query
                  properties:
                    query:
                      type: string
                      description: Search query
                      example: Bohemian Rhapsody
                    limit:
                      type: integer
                      minimum: 1
                      maximum: 50
                      default: 10
                      description: Maximum results
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMediaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /media/unified-search:
    post:
      tags:
        - Media
      summary: Unified search
      description: Search across multiple platforms simultaneously
      operationId: unifiedSearch
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - params
              properties:
                params:
                  type: object
                  required:
                    - query
                  properties:
                    query:
                      type: string
                      description: Search query
                      example: Never Gonna Give You Up
                    platforms:
                      type: array
                      items:
                        type: string
                        enum: [spotify, youtube, fen, kodi]
                      description: Platforms to search
                      example: [spotify, youtube]
      responses:
        '200':
          description: Unified search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/usage:
    get:
      tags:
        - Analytics
      summary: Get usage analytics
      description: Retrieve API usage analytics and statistics
      operationId: getUsageAnalytics
      security:
        - APIKeyAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
          description: Start date (ISO 8601)
          example: '2026-03-01T00:00:00.000Z'
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
          description: End date (ISO 8601)
          example: '2026-03-27T23:59:59.999Z'
        - name: granularity
          in: query
          schema:
            type: string
            enum: [hour, day, week, month]
            default: day
          description: Time granularity
      responses:
        '200':
          description: Usage analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageAnalyticsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/quota:
    get:
      tags:
        - Analytics
      summary: Get quota usage
      description: Retrieve current quota usage for API key
      operationId: getQuotaUsage
      security:
        - APIKeyAuth: []
      responses:
        '200':
          description: Quota usage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaUsageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /email/send:
    post:
      tags:
        - Email
      summary: Send email
      description: Send transactional email via SendGrid
      operationId: sendEmail
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailRequest'
      responses:
        '200':
          description: Email sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  messageId:
                    type: string
                    example: abc123def456
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /keys:
    post:
      tags:
        - API Keys
      summary: Create API key
      description: Generate a new API key with specified scopes and tier
      operationId: createApiKey
      security:
        - APIKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /keys/{apiKey}:
    get:
      tags:
        - API Keys
      summary: Get API key details
      description: Retrieve details about an API key
      operationId: getApiKey
      security:
        - APIKeyAuth: []
      parameters:
        - name: apiKey
          in: path
          required: true
          schema:
            type: string
          description: API key identifier (masked)
          example: sk_...abc123
      responses:
        '200':
          description: API key details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keys/{apiKey}:
    delete:
      tags:
        - API Keys
      summary: Revoke API key
      description: Revoke an API key
      operationId: revokeApiKey
      security:
        - APIKeyAuth: []
      parameters:
        - name: apiKey
          in: path
          required: true
          schema:
            type: string
          description: API key identifier (masked)
          example: sk_...abc123
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: API key revoked successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /rate-limit/check:
    get:
      tags:
        - Rate Limiting
      summary: Check rate limit status
      description: Check current rate limit status for API key
      operationId: checkRateLimit
      security:
        - APIKeyAuth: []
      responses:
        '200':
          description: Rate limit status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    APIKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: API key authentication (Bearer token)
      scheme: bearer
      bearerFormat: API Key

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
        - timestamp
        - uptime
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time
        uptime:
          type: integer
          description: Uptime in seconds

    ReadinessResponse:
      type: object
      required:
        - status
        - services
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        services:
          type: object
          additionalProperties:
            type: string
            enum: [ready, not_ready]
          example:
            firestore: ready
            pubsub: ready
            cloud_tasks: ready

    AddProductRequest:
      type: object
      required:
        - userId
        - url
      properties:
        userId:
          type: string
          description: User identifier for ownership
          example: user_123
        url:
          type: string
          format: uri
          description: Product URL to scrape
          example: 'https://example.com/product/123'
        threshold:
          type: number
          format: float
          description: Price threshold for alerts
          example: 99.99
          default: 0
        platform:
          type: string
          description: E-commerce platform
          enum: [amazon, ebay, walmart, target, bestbuy, auto]
          example: amazon
          default: auto
        priority:
          type: string
          enum: [low, normal, high]
          description: Task priority
          example: high
          default: normal

    AddProductResponse:
      type: object
      required:
        - success
        - message
        - productId
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Product added to tracking
        productId:
          type: string
          example: abc123def456
        priority:
          type: string
          example: high

    GetProductsResponse:
      type: object
      required:
        - success
        - products
        - count
      properties:
        success:
          type: boolean
          example: true
        products:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: abc123
              url:
                type: string
                example: 'https://example.com/product/123'
              threshold:
                type: number
                example: 99.99
              platform:
                type: string
                example: amazon
              priority:
                type: string
                example: high
              active:
                type: boolean
                example: true
              createdAt:
                type: string
                format: date-time
              lastChecked:
                type: string
                format: date-time
        count:
          type: integer
          example: 1
        pagination:
          type: object
          properties:
            limit:
              type: integer
            offset:
              type: integer
            total:
              type: integer

    ProductDetails:
      type: object
      required:
        - success
        - product
      properties:
        success:
          type: boolean
          example: true
        product:
          type: object
          properties:
            id:
              type: string
            url:
              type: string
            currentPrice:
              type: number
            threshold:
              type: number
            platform:
              type: string
            priority:
              type: string
            active:
              type: boolean
            createdAt:
              type: string
              format: date-time
            lastChecked:
              type: string
              format: date-time

    PriceHistoryResponse:
      type: object
      required:
        - success
        - productId
        - history
        - count
      properties:
        success:
          type: boolean
          example: true
        productId:
          type: string
          example: abc123def456
        history:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              price:
                type: number
              currency:
                type: string
                example: USD
              available:
                type: boolean
        count:
          type: integer
          example: 2

    TextToSpeechRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 5000
          description: Text to convert to speech
          example: 'Once upon a time, in a land far away...'
        character:
          type: string
          enum: [narrator, hero, villain, sidekick, wise_old_man, mystical_creature]
          description: Character voice
          example: narrator
          default: narrator
        emotion:
          type: string
          enum: [neutral, excited, sad, mysterious, determined, worried, curious,
                  contemplative, urgent, gentle, angry, mocking, sinister, powerful]
          description: Emotion modifier
          example: mysterious
          default: neutral

    TextToSpeechResponse:
      type: object
      required:
        - success
        - audio
      properties:
        success:
          type: boolean
          example: true
        audio:
          type: string
          format: byte
          description: Base64-encoded audio data (MP3 format)
        cached:
          type: boolean
          description: Whether result was cached
          example: false
        character:
          type: string
          example: narrator
        emotion:
          type: string
          example: mysterious
        duration:
          type: number
          description: Audio duration in seconds
          example: 5.2

    GenerateStoryRequest:
      type: object
      required:
