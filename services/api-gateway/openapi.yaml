        success:
          type: boolean
          example: true
        story:
          type: object
          properties:
            title:
              type: string
              example: The Dragon's Quest
            genre:
              type: string
              example: fantasy
            segments:
              type: array
              items:
                type: object
                properties:
                  character:
                    type: string
                  emotion:
                    type: string
                  text:
                    type: string
                  duration:
                    type: number
            totalDuration:
              type: number
              description: Total audio duration in seconds
              example: 45.8
            wordCount:
              type: integer
              example: 512

    VoiceProfilesResponse:
      type: object
      required:
        - success
        - profiles
      properties:
        success:
          type: boolean
          example: true
        profiles:
          type: object
          additionalProperties:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              voiceConfig:
                type: object
              emotionModifiers:
                type: object

    PlayMediaRequest:
      type: object
