<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniClaw Vault Control Center</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="./components.js"></script>
  <style>
    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 9999;
    }
    .loading-overlay p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.hidden { display: none; }
    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      min-width: 360px;
      max-width: 90vw;
    }
    .modal-content h3 {
      margin-bottom: 1rem;
      color: var(--text-primary);
    }
    .modal-content .search-input {
      width: 100%;
      margin-bottom: 1rem;
    }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    /* Buttons */
    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: var(--bg-secondary);
      border-color: var(--accent);
    }
    .btn-secondary:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
    }
    .btn-clear {
      padding: 0.4rem;
      opacity: 0.6;
    }
    .btn-clear:hover { opacity: 1; }

    /* Header glass morphism */
    .header {
      background: rgba(13, 17, 23, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .header-left h1 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    /* Logo animations */
    .logo {
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    .logo::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #6366f1, #8b5cf6, #ec4899, #6366f1);
      z-index: -1;
      animation: gradient-rotate 4s linear infinite;
      filter: blur(8px);
      opacity: 0.6;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes gradient-rotate {
      to { filter: hue-rotate(360deg); }
    }

    /* Input focus states */
    .input-group input:focus,
    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.25);
    }

    /* Sync buttons */
    .btn-sync {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
    }
    .btn-sync.loading {
      opacity: 0.7;
      pointer-events: none;
    }
    .btn-sync.loading svg {
      animation: spin 1s linear infinite;
    }
    .btn-sync span {
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>Loading vault...</p>
  </div>
  <!-- Login Screen -->
  <div id="login-screen" class="login-container">
    <div class="login-box">
      <div class="logo">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>OmniClaw Vault Control</h1>
      <p class="subtitle">Enter password to access</p>
      <form id="login-form">
        <div class="input-group">
          <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary">Access Dashboard</button>
        <p id="login-error" class="error-msg"></p>
      </form>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div id="dashboard" class="dashboard hidden">
    <header class="header">
      <div class="header-left">
        <svg class="logo-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <h1>OmniClaw Vault Control</h1>
      </div>
      <div class="header-right">
        <span id="last-update" class="last-update"></span>
        <button id="refresh-btn" class="btn-icon" title="Refresh">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
        <button id="logout-btn" class="btn-icon" title="Logout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="search">Search</button>
      <button class="tab" data-tab="sync">Sync</button>
      <button class="tab" data-tab="browse">Browse</button>
      <button class="tab" data-tab="system">System</button>
    </nav>

    <!-- Tab Content -->
    <main class="content">
      <!-- Dashboard Tab -->
      <section id="tab-dashboard" class="tab-content active">
        <div class="stats-grid" id="vault-stats"></div>
        <div class="section">
          <h2>Recent Sync Activity</h2>
          <div id="sync-history" class="history-list"></div>
        </div>
      </section>

      <!-- Search Tab -->
      <section id="tab-search" class="tab-content">
        <div class="section">
          <h2>Vault Search</h2>
          <div class="search-bar">
            <input type="text" id="search-input" class="search-input" placeholder="Search tweets, posts, bookmarks... (min 2 chars)">
            <button id="search-clear" class="btn-icon btn-clear" title="Clear">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
            <select id="search-source" class="select-file search-select">
              <option value="all">All Sources</option>
              <option value="twitter">Twitter Only</option>
              <option value="instagram">Instagram Only</option>
              <option value="browser">Browser Bookmarks</option>
            </select>
            <button id="search-btn" class="btn-primary">Search</button>
          </div>
          <div id="search-status" class="search-status">Load search index by typing above</div>
          <div id="search-count" class="search-count"></div>
          <div id="search-results" class="search-results"></div>
        </div>
      </section>

      <!-- Sync Tab -->
      <section id="tab-sync" class="tab-content">
        <div class="sync-actions">
          <button class="btn-sync" data-sync="twitter">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            <span>Sync Twitter</span>
          </button>
          <button class="btn-sync" data-sync="instagram">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073z"/></svg>
            <span>Sync Instagram</span>
          </button>
          <button class="btn-sync" data-sync="bookmarks">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
            <span>Sync Bookmarks</span>
          </button>
          <button class="btn-sync btn-sync-all" data-sync="all">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            <span>Sync All</span>
          </button>
        </div>
        <div id="sync-status" class="sync-status"></div>
      </section>

      <!-- Browse Tab -->
      <section id="tab-browse" class="tab-content">
        <div class="browse-controls">
          <select id="browse-file" class="select-file">
            <option value="vault/twitter_bookmarks_automated.json">Twitter Bookmarks (800)</option>
            <option value="vault/instagram_saved_automated.json">Instagram Saved (500)</option>
            <option value="vault/bookmarks_automated.json">Browser Bookmarks (98)</option>
            <option value="vault/browser_bookmarks.json">Browser Bookmarks Alt (16)</option>
            <option value="unified_knowledge_graph.json">Knowledge Graph (2110 nodes)</option>
          </select>
          <button id="browse-load" class="btn-primary">Load</button>
        </div>
        <div id="browse-info" class="browse-info"></div>
        <div id="browse-data" class="browse-data"></div>
        <div id="browse-pagination" class="pagination"></div>
      </section>

      <!-- System Tab -->
      <section id="tab-system" class="tab-content">
        <div class="section">
          <h2>Cloud Functions</h2>
          <div id="functions-list" class="functions-list"></div>
        </div>
        <div class="section">
          <h2>Scheduled Jobs</h2>
          <div id="schedulers-list" class="schedulers-list"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- URL Modal -->
  <div id="url-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Open URL</h3>
      <input type="text" id="url-input" class="search-input" placeholder="https://...">
      <div class="modal-actions">
        <button id="url-open-btn" class="btn-primary">Open</button>
        <button id="url-cancel-btn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
