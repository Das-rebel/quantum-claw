name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🟢 Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🔍 Run linter
      run: npm run lint --if-present
      continue-on-error: true
    
    - name: 🧪 Run tests
      run: npm test --if-present
      continue-on-error: true
    
    - name: 📊 Generate coverage
      run: npm run test:coverage --if-present
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🔒 Run security audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: 🚨 Check for vulnerabilities
      run: npm audit --json
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🔨 Build project
      run: npm run build --if-present
      continue-on-error: true
    
    - name: 🐳 Build Docker image
      run: docker build -t quantum-claw:test .
      continue-on-error: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🚀 Deploy to production
      run: |
        echo "Deploying to production..."
        # Add your deployment commands here
        # Example: npm run deploy:production
    
    - name: 🔔 Notify deployment
      run: |
        echo "Deployment successful!"
        # Add notification commands here
        # Example: Send Discord webhook, email, etc.

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🏷️ Publish release
      run: |
        echo "Publishing release ${{ github.event.release.tag_name }}"
        # Add publishing commands here
        # Example: npm publish
    
    - name: 🎉 Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.event.release.tag_name }}
        release_name: Release ${{ github.event.release.tag_name }}
        draft: false
        prerelease: false